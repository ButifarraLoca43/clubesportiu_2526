<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Proponer PAP/PATI</title>
</head>
<body>

<section layout:fragment="content">
    <h1>Proponer PAP/PATI</h1>

    <form th:action="@{/tecnico/match/asignar/{requestId}(requestId=${requestId})}" method="post">

        <fieldset>
            <legend class="visually-hidden">
                Selecciona los PAP/PATI que quieres asignar a esta petición
            </legend>

            <table class="table table-striped">
                <thead>
                <tr>
                    <th scope="col">#</th>
                    <th scope="col">DNI</th>
                    <th scope="col">Nombre</th>
                    <th scope="col">Apellidos</th>
                    <th scope="col">Email</th>

                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${papPatis}">
                    <td>
                        <div class="form-check">
                            <input
                                    class="form-check-input"
                                    type="checkbox"
                                    name="papIds"
                                    th:id="'chk-' + ${p.idNumber}"
                                    th:value="${p.idNumber}" />
                            <label
                                    class="form-check-label visually-hidden"
                                    th:for="'chk-' + ${p.idNumber}"
                                    th:text="'Seleccionar a ' + ${p.name} + ' ' + ${p.surname}">
                            </label>
                        </div>
                    </td>
                    <td th:text="${p.idNumber}"></td>
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.surname}"></td>
                    <td th:text="${p.email}"></td>

                </tr>
                </tbody>
            </table>
        </fieldset>

        <div class="mt-3">
            <button type="button" class="btn btn-primary"
                    data-bs-toggle="modal" data-bs-target="#confirmModal">
                Asignar seleccionados
            </button>
            <a th:href="@{/requestAssist/list}" class="btn btn-secondary">Volver a Solicitudes</a>
        </div>

        <div class="modal fade" id="confirmModal" tabindex="-1"
             aria-labelledby="confirmModalLabel"
             aria-describedby="confirmModalDesc">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="confirmModalLabel">Confirmar asignación</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal">
                            <span class="visually-hidden">Cerrar</span>
                        </button>
                    </div>
                    <div class="modal-body" id="confirmModalDesc">
                        ¿Estás seguro de que deseas asignar estos Asistentes a la petición de asistencia?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Sí, asignar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </form>
</section>


</body>
</html>
