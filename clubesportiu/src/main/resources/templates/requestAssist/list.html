<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Solicitudes de asistencia</title>
</head>
<body>

<section layout:fragment="content">

    <h1>Solicitudes de asistencia</h1>

    <table class="table table-striped">
        <thead style="background-color: #0e6a89 !important; color: white !important;">
        <tr>
            <th style="background-color: transparent !important; color: white !important;">DNI/NIE Miembro de la OVI</th>
            <th style="background-color: transparent !important; color: white !important;">Fecha</th>
            <th style="background-color: transparent !important; color: white !important;">Tipo de apoyo</th>
            <th style="background-color: transparent !important; color: white !important;">Descripción</th>
            <th style="background-color: transparent !important; color: white !important;">Estado</th>
            <th style="background-color: transparent !important; color: white !important;">Acciones</th>

        </tr>
        </thead>

        <tbody>
        <tr th:each="r : ${requestAssists}">
            <td th:text="${r.iduser}"></td>
            <td th:text="${#temporals.format(r.date, 'dd/MM/yyyy')}"></td>
            <td th:text="${r.requiredsupport}"></td>
            <td th:text="${r.description}"></td>
            <td th:text="${r.estado}"></td>
            <td>
                <a th:href="@{/tecnico/match/create/{idnumber}(idnumber=${r.idnumber})}"
                   class="btn btn-primary btn-sm">Proponer asistente personal</a>

            </td>
        </tr>
        </tbody>
    </table>
    <div class="mt-4 d-flex justify-content-between align-items-center">
        <a th:href="@{/tecnico/panel}"       class="btn btn-secondary">Volver</a>
    </div>


</section>
</body>
</html>
