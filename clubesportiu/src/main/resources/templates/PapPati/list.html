<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Listado de PAP/PATIS</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">

    <h1 class="mb-4">Listado de PAP/PATI</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Usuario</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>DNI</th>
            <th>Email</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${oviusers}">
            <td th:text="${u.userName}"></td>
            <td th:text="${u.name}"></td>
            <td th:text="${u.surname}"></td>
            <td th:text="${u.idNumber}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.phoneNumber}"></td>

            <td>
                <a th:href="@{/oviuser/update/{userName}(userName=${u.userName})}"
                   class="btn btn-warning btn-sm">Editar</a>

                <a th:href="@{/oviuser/delete/{userName}(userName=${u.userName})}"
                   class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/oviuser/add" class="btn btn-success">Añadir PAP/PATI</a>
    <br><br>
    <a href="/" class="btn btn-info">Volver</a>

</main>
</body>
</html>
