<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Actualizar PAP/PATI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">

    <h1 class="mb-4">Actualizar PAP/PATI</h1>

    <form th:action="@{/oviuser/update}" th:object="${oviuser}" method="post">

        <!-- userName actúa como ID -->
        <input type="hidden" th:field="*{userName}" />

        <!-- Nombre -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Nombre:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{name}" required />
            </div>
        </div>

        <!-- Apellidos -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Apellidos:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{surname}" required />
            </div>
        </div>

        <!-- Fecha nacimiento -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Fecha de nacimiento:</label>
            <div class="col-sm-4">
                <input type="date" class="form-control" th:field="*{dateBirth}" required />
            </div>
        </div>

        <!-- DNI -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">DNI:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{idNumber}" required />
            </div>
        </div>

        <!-- Teléfono -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Teléfono:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{phoneNumber}" required />
            </div>
        </div>

        <!-- Email -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Email:</label>
            <div class="col-sm-4">
                <input type="email" class="form-control" th:field="*{email}" required />
            </div>
        </div>

        <!-- Dirección -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Dirección:</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" th:field="*{address}" />
            </div>
        </div>

        <!-- Diversidad funcional -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Diversidad funcional:</label>
            <div class="col-sm-4">
                <select class="form-control" th:field="*{funcDiversity}">
                    <option th:each="d : ${diversityTypes}"
                            th:value="${d}"
                            th:text="${d}">
                    </option>
                </select>
            </div>
        </div>

        <!-- Grado dependencia -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Grado de dependencia:</label>
            <div class="col-sm-4">
                <input type="number" class="form-control" th:field="*{dependencyGrade}" />
            </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group row">
            <label class="col-sm-2 control-label">Contraseña:</label>
            <div class="col-sm-4">
                <input type="password" class="form-control" th:field="*{userPassword}" required />
            </div>
        </div>

        <!-- Botones -->
        <div class="form-group row mt-3">
            <div class="col-sm-offset-2 col-sm-4">
                <button type="submit" class="btn btn-primary">Guardar cambios</button>
                <a href="/oviuser/list" class="btn btn-secondary">Cancelar</a>
            </div>
        </div>

    </form>

</main>
</body>
</html>
