<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Eliminar PAP/PATI</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container mt-4">

    <h1 class="mb-4">Eliminar PAP/PATI</h1>

    <div class="alert alert-danger">
        <p>¿Seguro que deseas eliminar este usuario?</p>

        <ul>
            <li><strong>Usuario:</strong> <span th:text="${oviuser.userName}"></span></li>
            <li><strong>Nombre:</strong> <span th:text="${oviuser.name}"></span></li>
            <li><strong>Apellidos:</strong> <span th:text="${oviuser.surname}"></span></li>
            <li><strong>Email:</strong> <span th:text="${oviuser.email}"></span></li>
        </ul>
    </div>

    <form th:action="@{/oviuser/delete}" method="post">
        <!-- userName es la clave del usuario -->
        <input type="hidden" name="userName" th:value="${oviuser.userName}" />

        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="/oviuser/list" class="btn btn-secondary">Cancelar</a>
    </form>

</main>
</body>
</html>
