<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Listado</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <h1>Actividades Disponibles</h1>
        <table class="table table-striped mt-4">
            <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Estado</th>
                <th>Instructores asignados</th>
                <th>Detalles</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${activities}">
                <td th:text="${a.idNumber}"></td>
                <td th:text="${a.name}"></td>
                <td th:text="${a.date}"></td>
                <td th:text="${a.estado}"></td>
                <td>
                    <span class="badge bg-secondary" th:text="${(instructorCounts[a.idNumber] ?: 0)} + ' instructor(es)'">0 instructor(es)</span>
                </td>
                <td style="width: 1%; white-space: nowrap; text-align: right;">
                    <div style="display: flex !important; gap: 4px !important; justify-content: flex-start !important;">

                        <a th:href="@{/activity/details/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-info text-white"
                           style="width: auto !important; display: inline-block !important;">Más información</a>
                    </div>
                </td>
                <td style="width: 1%; white-space: nowrap; text-align: right;">
                    <div style="display: flex !important; gap: 4px !important; justify-content: flex-start !important;">

                        <a th:href="@{/activity/update/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-warning"
                           style="width: auto !important; display: inline-block !important;">Editar</a>

                        <a th:href="@{/activity/delete/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-danger"
                           style="width: auto !important; display: inline-block !important;">Borrar</a>

                        <a th:if="${a.estado != null and #strings.equalsIgnoreCase(a.estado, 'aceptado')}"
                           th:href="@{/imparts/assign/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-info text-white"
                           style="width: auto !important; display: inline-block !important;">
                            Asignar instructores
                        </a>

                    </div>
                </td>
            </tr>
            </tbody>
        </table>
        <div class="row g-2">
            <div class="col-6">
                <a href="/activity/listPendientes" class="btn btn-warning w-100">Editar estados de las actividades</a>
            </div>

            <div class="col-6">
                <a href="/activity/add" class="btn btn-success w-100">Nueva Actividad</a>
            </div>
        </div>
    </div>
</section>
