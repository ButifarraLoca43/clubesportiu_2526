<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Actividades Disponibles</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <h1>Nuestras Actividades</h1>

        <div th:if="${#lists.isEmpty(activities)}" class="alert alert-info text-dark" style="color: #000000 !important; font-weight: 500;">
            Ahora mismo no hay actividades disponibles para apuntarse.
        </div>

        <table class="table table-hover mt-4" th:unless="${#lists.isEmpty(activities)}">
            <thead style="background-color: #0e6a89 !important; color: white !important;">
            <tr>
                <th style="background-color: transparent !important; color: white !important;">Nombre</th>
                <th style="background-color: transparent !important; color: white !important;">Fecha</th>
                <th style="background-color: transparent !important; color: white !important;">Hora</th>
                <th style="background-color: transparent !important; color: white !important;">Lugar</th>
                <th style="background-color: transparent !important; color: white !important;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${activities}">
                <td class="fw-bold" th:text="${a.name}"></td>
                <td th:text="${#temporals.format(a.date, 'dd/MM/yyyy')}"></td>
                <td th:text="${a.time}"></td>
                <td th:text="${a.location}"></td>
                <td>
                    <a th:href="@{/activity/details/{id}(id=${a.idNumber})}"
                       class="btn btn-sm btn-info text-white"
                       style="background-color: #106b86 !important; border-color: #106b86 !important;">Más información</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mt-4 border-top pt-3">

        <a th:href="@{/activity/listInscripciones}" class="btn btn-primary shadow-sm order-1 order-md-2 px-4">
            Ver las próximas actividades
        </a>

        <div>
            <th:block th:if="${session.user != null}">
                <a th:if="${#strings.equalsIgnoreCase(session.user.tipoUsuario.name(), 'instructor')}" th:href="@{/instructor/panel}" class="btn btn-secondary px-4">Volver al panel</a>
                <a th:if="${#strings.equalsIgnoreCase(session.user.tipoUsuario.name(), 'tecnico')}" th:href="@{/tecnico/panel}" class="btn btn-secondary px-4">Volver al panel</a>
                <a th:if="${#strings.equalsIgnoreCase(session.user.tipoUsuario.name(), 'pap_pati')}" th:href="@{/pap_pati/panel}" class="btn btn-secondary px-4">Volver al panel</a>
                <a th:if="${#strings.equalsIgnoreCase(session.user.tipoUsuario.name(), 'oviuser')}" th:href="@{/oviuser/panel}" class="btn btn-secondary px-4">Volver al panel</a>
            </th:block>
            <th:block th:unless="${session.user != null}">
                <a th:href="@{/}" class="btn btn-secondary px-4">Volver al inicio</a>
            </th:block>
        </div>
    </div>
</section>
</body>
</html>
