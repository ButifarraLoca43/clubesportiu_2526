<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Mis Actividades</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <h1>Historial de Mis Actividades</h1>

        <div th:if="${#lists.isEmpty(activities)}" class="alert alert-info text-dark" style="color: #000000 !important; font-weight: 500;">
            No te has inscrito en ninguna actividad todavía.
        </div>

        <table class="table table-hover mt-4" th:unless="${#lists.isEmpty(activities)}">
            <thead style="background-color: #0e6a89 !important; color: white !important;">
            <tr>
                <th style="background-color: transparent !important; color: white !important;">Nombre</th>
                <th style="background-color: transparent !important; color: white !important;">Fecha</th>
                <th style="background-color: transparent !important; color: white !important;">Hora</th>
                <th style="background-color: transparent !important; color: white !important;">Lugar</th>
                <th style="background-color: transparent !important; color: white !important;">Estado</th>
                <th style="background-color: transparent !important; color: white !important;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${activities}">
                <td class="fw-bold" th:text="${a.name}"></td>
                <td th:text="${#temporals.format(a.date, 'dd/MM/yyyy')}"></td>
                <td th:text="${a.time}"></td>
                <td th:text="${a.location}"></td>
                <td th:text="${a.estado}"></td>
                <td>
                    <a th:href="@{/activity/details/{id}(id=${a.idNumber})}" class="btn btn-primary">Más información</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between mt-4">

        <div>
            <a th:if="${user != null and user.tipoUsuario.name() == 'instructor'}"
               th:href="@{/instructor/panel}" class="btn btn-secondary px-4">Volver a mi panel</a>

            <a th:if="${user != null and user.tipoUsuario.name() == 'OVIUser'}"
               th:href="@{/oviuser/panel}" class="btn btn-secondary px-4">Volver a mi panel</a>

            <a th:if="${user != null and user.tipoUsuario.name() == 'PAP_PATI'}"
               th:href="@{/pappati/panel}" class="btn btn-secondary px-4">Volver a mi panel</a>

            <a th:if="${user == null}" href="#" onclick="window.history.back(); return false;"
               class="btn btn-secondary px-4">Volver atrás</a>
        </div>

        <a th:href="@{/activity/listMisActividadesFuturas}" class="btn btn-primary px-4">
            Ver mis próximas actividades
        </a>
    </div>
</section>
</body>
</html>
