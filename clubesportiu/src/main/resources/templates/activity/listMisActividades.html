<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Mis Actividades</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <h1 class="mb-4">Historial de Mis Actividades</h1>

        <div th:if="${#lists.isEmpty(activities)}" class="alert alert-info">
            No te has inscrito en ninguna actividad todavía.
        </div>

        <table class="table table-hover mt-4" th:unless="${#lists.isEmpty(activities)}">
            <thead class="table-primary">
            <tr>
                <th>Nombre</th>
                <th>Fecha</th>
                <th>Hora</th>
                <th>Lugar</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${activities}">
                <td class="fw-bold" th:text="${a.name}"></td>
                <td th:text="${a.date}"></td>
                <td th:text="${a.time}"></td>
                <td th:text="${a.location}"></td>
                <td th:text="${a.estado}"></td>
                <td>
                    <a th:href="@{/activity/details/{id}(id=${a.idNumber})}" class="btn btn-sm btn-info text-white">Más información</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="d-flex justify-content-end mt-4">
        <a th:href="@{/activity/listMisActividadesFuturas}" class="btn btn-primary">
            Ver mis próximas actividades
        </a>
    </div>
</section>
</body>
</html>
