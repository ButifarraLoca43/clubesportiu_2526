<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>Actividades Pendientes</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h1 class="mb-4">Revisión de Actividades Pendientes</h1>

<div th:if="${#lists.isEmpty(activities)}" class="alert alert-info">
    No hay actividades pendientes de revisión en este momento.
</div>

<table class="table table-striped mt-4" th:unless="${#lists.isEmpty(activities)}">
    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Fecha</th>
        <th>Hora</th>
        <th>Lugar</th>
        <th>Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="a : ${activities}">
        <td th:text="${a.idNumber}"></td>
        <td th:text="${a.name}"></td>
        <td th:text="${a.date}"></td>
        <td th:text="${a.time}"></td>
        <td th:text="${a.location}"></td>
        <td>
            <a th:href="@{/activity/accept/{id}(id=${a.idNumber})}" class="btn btn-sm btn-success fw-bold">✓ Aceptar</a>

            <a th:href="@{/activity/reject/{id}(id=${a.idNumber})}" class="btn btn-sm btn-danger fw-bold">✗ Rechazar</a>
        </td>
    </tr>
    </tbody>
</table>

<div class="mt-4">
    <a href="/activity/listTodos" class="btn btn-secondary">Volver al listado general</a>
</div>

</body>
</html>
