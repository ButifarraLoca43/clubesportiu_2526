<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Actividades Pendientes</title>
</head>
<body>

<section layout:fragment="content">
    <div class="card p-4 shadow-sm border-0">
        <h1 class="mb-4 text-primary">Revisión de Actividades Pendientes</h1>

        <div th:if="${#lists.isEmpty(activities)}" class="alert alert-info border-0 shadow-sm">
            No hay actividades pendientes de revisión en este momento.
        </div>

        <div class="table-responsive" th:unless="${#lists.isEmpty(activities)}">
            <table class="table table-hover align-middle mt-2">
                <thead class="table-light">
                <tr>
                    <th class="text-muted">ID</th>
                    <th>Nombre</th>
                    <th>Fecha</th>
                    <th>Hora</th>
                    <th>Lugar</th>
                    <th class="text-center">Acciones</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="a : ${activities}">
                    <td th:text="${a.idNumber}" class="fw-bold text-muted"></td>
                    <td th:text="${a.name}" class="fw-semibold"></td>
                    <td th:text="${a.date}"></td>
                    <td th:text="${a.time}"></td>
                    <td th:text="${a.location}"></td>
                    <td class="text-center">
                        <a th:href="@{/activity/accept/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-success fw-bold px-3">
                            ✓ Aceptar
                        </a>
                        <a th:href="@{/activity/reject/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-outline-danger fw-bold px-3 ms-1">
                            ✗ Rechazar
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="mt-4 border-top pt-4">
            <a th:href="@{/activity/listTodos}" class="btn btn-secondary px-4">Volver al listado general</a>
        </div>
    </div>
</section>

</body>
</html>
