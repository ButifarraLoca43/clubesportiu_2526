<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Listado</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <h1>Actividades de Divulgación</h1>
        <table class="table table-striped mt-4">
            <thead style="background-color: #0e6a89 !important; color: white !important;">
            <tr>
                <th style="background-color: transparent !important; color: white !important;">ID</th>
                <th style="background-color: transparent !important; color: white !important;">Nombre</th>
                <th style="background-color: transparent !important; color: white !important;">Fecha</th>
                <th style="background-color: transparent !important; color: white !important;">Estado</th>
                <th style="background-color: transparent !important; color: white !important;">Instructores asignados</th>
                <th style="background-color: transparent !important; color: white !important;">Detalles</th>
                <th style="background-color: transparent !important; color: white !important;">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="a : ${activities}">
                <td th:text="${a.idNumber}"></td>
                <td th:text="${a.name}"></td>
                <td th:text="${#temporals.format(a.date, 'dd/MM/yyyy')}"></td>
                <td th:text="${a.estado}"></td>
                <td th:text="${(instructorCounts[a.idNumber] ?: 0)} + ' instructor(es)'"></td>
                <td style="width: 1%; white-space: nowrap; text-align: right;">
                    <div style="display: flex !important; gap: 4px !important; justify-content: flex-start !important;">

                        <a th:href="@{/activity/details/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-info text-white"
                           style="background-color: #106b86 !important; border-color: #106b86 !important;">Más información</a>
                    </div>
                </td>
                <td style="width: 1%; white-space: nowrap; text-align: right;">
                    <div style="display: flex !important; gap: 4px !important; justify-content: flex-start !important;">

                        <a th:href="@{/activity/update/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-warning"
                           style="width: auto !important; display: inline-block !important;">Editar</a>

                        <a th:href="@{/activity/delete/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-danger"
                           style="width: auto !important; display: inline-block !important;">Borrar</a>

                        <a th:if="${a.estado != null and #strings.equalsIgnoreCase(a.estado, 'aceptado')}"
                           th:href="@{/imparts/assign/{id}(id=${a.idNumber})}"
                           class="btn btn-sm btn-info text-white"
                           style="background-color: #106b86 !important; border-color: #106b86 !important;">
                            Asignar instructores
                        </a>

                    </div>
                </td>
            </tr>
            </tbody>
        </table>

        <div class="row g-2 mt-2">
            <div class="col-6">
                <a th:href="@{/activity/listPendientes}" class="btn btn-warning w-100">Editar estados de las actividades</a>
            </div>
            <div class="col-6">
                <a th:href="@{/activity/add}" class="btn btn-success w-100">Nueva Actividad</a>
            </div>
            <div class="col-12 mt-3 text-start border-top pt-3">
                <a th:href="@{/activity/listTodos}" class="btn btn-secondary px-4">Volver al listado general</a>
            </div>
        </div>

    </div>
</section>
</body>
</html>
