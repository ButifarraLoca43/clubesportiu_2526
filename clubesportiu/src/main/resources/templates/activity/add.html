<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Añadir Actividad</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <h1 class="mb-4">Nueva Actividad</h1>
        <form th:action="${activity.idNumber == null} ? @{/activity/add} : @{/activity/update}" th:object="${activity}" method="post">
            <input type="hidden" th:field="*{idNumber}" />

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{name}" class="form-control" />
                    <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Lugar</label>
                    <input type="text" th:field="*{location}" class="form-control" />
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" th:field="*{date}" class="form-control" />
                </div>
                <div class="col-md-3">
                    <label class="form-label">Hora</label>
                    <input type="time" th:field="*{time}" class="form-control" />
                </div>
                <div class="col-md-3">
                    <label class="form-label">Capacidad</label>
                    <input type="number" th:field="*{capacity}" class="form-control" />
                </div>
                <div class="col-md-3">
                    <label class="form-label">Precio</label>
                    <input type="number" step="0.01" th:field="*{price}" class="form-control" />
                </div>
            </div>

            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="/activity/listTodos" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</section>
</body>
</html>
