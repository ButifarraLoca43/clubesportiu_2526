<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Añadir Actividad</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm border-0">
        <h1>Nueva Actividad</h1>

        <form id="activityForm" th:action="${activity.idNumber == null} ? @{/activity/add} : @{/activity/update}" th:object="${activity}" method="post">
            <input type="hidden" th:field="*{idNumber}" />

            <div class="row mb-3">
                <div class="col-md-6 mb-3">
                    <label for="tipo" class="form-label fw-bold">Tipo de Actividad</label>
                    <select th:field="*{tipo}" id="tipo" class="form-select">
                        <option value="">-- Selecciona tipo --</option>
                        <option th:each="t : ${typeList}" th:value="${t}" th:text="${t}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('tipo')}" th:errors="*{tipo}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-6">
                    <label for="name" class="form-label fw-bold">Nombre</label>
                    <input type="text" th:field="*{name}" id="name" class="form-control" />
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-6">
                    <label for="location" class="form-label fw-bold">Lugar</label>
                    <input type="text" th:field="*{location}" id="location" class="form-control" />
                    <p th:if="${#fields.hasErrors('location')}" th:errors="*{location}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>
            </div>

            <div class="row mb-4">
                <div class="col-md-3">
                    <label for="date" class="form-label fw-bold">Fecha</label>
                    <input type="date" th:field="*{date}" id="date" class="form-control" />
                    <p th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-3">
                    <label for="time" class="form-label fw-bold">Hora</label>
                    <input type="time" th:field="*{time}" id="time" class="form-control" />
                    <p th:if="${#fields.hasErrors('time')}" th:errors="*{time}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-3">
                    <label for="capacity" class="form-label fw-bold">Capacidad</label>
                    <input type="number" th:field="*{capacity}" id="capacity" class="form-control" />
                    <p th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-3">
                    <label for="price" class="form-label fw-bold">Precio</label>
                    <input type="number" step="0.01" th:field="*{price}" id="price" class="form-control" />
                    <p th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label fw-bold text-dark">Descripción</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="3"></textarea>
                    <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>
            </div>

            <div class="d-flex justify-content-between border-top pt-4 mt-2">
                <button type="button" class="btn btn-secondary px-4" data-bs-toggle="modal" data-bs-target="#cancelModal">
                    Cancelar
                </button>
                <button type="button" class="btn btn-primary px-4" style="background-color: #106b86 !important; border-color: #106b86 !important;" data-bs-toggle="modal" data-bs-target="#confirmAddModal">
                    Guardar
                </button>
            </div>

            <div class="modal fade" id="cancelModal" tabindex="-1" aria-labelledby="cancelModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title fs-5" id="cancelModalLabel">Confirmar salida</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            ¿Quieres salir?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">No</button>
                            <button type="button" class="btn btn-primary" data-bs-target="#exitSuccessModal" data-bs-toggle="modal">Sí</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="exitSuccessModal" tabindex="-1" aria-labelledby="exitSuccessModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title fs-5" id="exitSuccessModalLabel">Notificación</h2>
                        </div>
                        <div class="modal-body">
                            Has salido correctamente.
                        </div>
                        <div class="modal-footer">
                            <a th:href="@{/activity/listTodos}" class="btn btn-primary">OK</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="confirmAddModal" tabindex="-1" aria-labelledby="confirmAddModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2 class="modal-title fs-5" id="confirmAddModalLabel">Confirmar registro</h2>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                        </div>
                        <div class="modal-body">
                            ¿Quieres añadir esta actividad?
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Sí, añadir</button>
                        </div>
                    </div>
                </div>
            </div>

        </form>

        <div th:if="${saveSuccess}" class="modal fade show" tabindex="-1" aria-labelledby="saveSuccessModalLabel" aria-hidden="true" style="display: block; background: rgba(0,0,0,0.5);">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="saveSuccessModalLabel">Éxito</h2>
                    </div>
                    <div class="modal-body">
                        Se ha añadido correctamente.
                    </div>
                    <div class="modal-footer">
                        <a th:href="@{/activity/listTodos}" class="btn btn-primary">OK</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
</body>
</html>
