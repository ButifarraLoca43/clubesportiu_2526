<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Detalles de la Actividad</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-primary text-white">
                <h2 class="h4 mb-0" th:text="${activity.name}">Nombre de la actividad</h2>
            </div>

            <div class="card-body">
                <h5 class="card-title text-muted mb-4">Información detallada</h5>

                <ul class="list-group list-group-flush mb-4">
                    <li class="list-group-item"><strong>📅 Fecha:</strong> <span th:text="${activity.date}"></span></li>
                    <li class="list-group-item"><strong>🕒 Hora:</strong> <span th:text="${activity.time}"></span></li>
                    <li class="list-group-item"><strong>📍 Lugar:</strong> <span th:text="${activity.location}"></span></li>
                    <li class="list-group-item"><strong>💶 Precio:</strong> <span th:text="${activity.price} + ' €'"></span></li>
                    <li class="list-group-item"><strong>👥 Plazas totales:</strong> <span th:text="${activity.capacity}"></span></li>
                </ul>

                <div class="mb-4">
                    <h6 class="fw-bold">Descripción general:</h6>
                    <p class="mt-2 text-justify" th:text="${activity.description}">Aquí va la descripción larga de la actividad.</p>
                </div>

                <hr>

                <div class="d-flex justify-content-between align-items-center mt-4">
                    <a href="javascript:history.back()" class="btn btn-outline-secondary">Volver atrás</a>

                    <div th:if="${user != null}">

                        <a th:if="${user.tipoUsuario.name() == 'instructor'}"
                           th:href="@{/activity/request/{id}(id=${activity.idNumber})}"
                           class="btn btn-warning btn-lg shadow-sm">
                            Pedir actividad
                        </a>

                        <a th:unless="${user.tipoUsuario.name() == 'instructor'}"
                           th:href="@{/inscription/apuntarse/{id}(id=${activity.idNumber})}"
                           class="btn btn-success btn-lg shadow-sm">
                            ¡Inscribirse!
                        </a>

                    </div>

                    <div th:if="${user == null}">
                        <a th:href="@{/inscription/externo/{id}(id=${activity.idNumber})}" class="btn btn-primary">¡Apuntate ya!</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
