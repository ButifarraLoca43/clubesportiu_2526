<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Actividad</title>
    <style>
        /* Estilo opcional para un botón de borrado menos vibrante */
        .btn-soft-danger {
            background-color: #bb4d4d;
            border-color: #a34343;
            color: white;
        }
        .btn-soft-danger:hover {
            background-color: #a34343;
            color: white;
        }

        /* NUEVO: Forzamos colores seguros para accesibilidad
           El asterisco (*) asegura que NINGÚN estilo global sobreescriba el texto
        */
        .alerta-segura {
            background-color: #fff3cd !important; /* Amarillo muy pálido */
            border: 1px solid #ffe69c !important;
            border-left: 5px solid #ffc107 !important; /* Borde izquierdo para darle estilo */
        }
        .alerta-segura, .alerta-segura * {
            color: #000000 !important; /* Texto negro puro obligatorio */
        }
    </style>
</head>
<body>

<section layout:fragment="content">
    <div class="card p-4 shadow-sm border-0">

        <h1 class="mb-4 text-dark">Confirmar Eliminación</h1>

        <div class="alert alerta-segura shadow-sm mb-4">

            <h2 class="h5 alert-heading fw-bold">¿Estás seguro de que deseas eliminar esta actividad?</h2>

            <p>Esta acción es irreversible y la actividad desaparecerá del catálogo.</p>
            <hr style="border-color: #ccc;">

            <div class="row">
                <div class="col-md-6 mb-2">
                    <strong>Nombre:</strong> <span th:text="${activity.name}"></span>
                </div>
                <div class="col-md-6 mb-2">
                    <strong>Lugar:</strong> <span th:text="${activity.location}"></span>
                </div>
                    <div class="col-sm-4"><strong>Fecha:</strong> <span th:text="${#temporals.format(activity.date, 'dd/MM/yyyy')}"></span></div>
                <div class="col-md-6 mb-2">
                    <strong>Hora:</strong> <span th:text="${activity.time}"></span>
                </div>
                <div class="col-12 mt-2">
                    <strong>Más información:</strong> <span th:text="${activity.description}" class="fst-italic"></span>
                </div>
            </div>
        </div>
        <div class="border-top pt-4 mt-2">
            <form th:action="@{/activity/delete/{id}(id=${activity.idNumber})}" method="post" class="d-flex justify-content-between w-100 mt-3">

                <a href="#" onclick="alert('La acción ha sido cancelada. La actividad NO se ha eliminado.'); window.history.back(); return false;" class="btn btn-secondary px-4">
                    Cancelar
                </a>

                <button type="submit" onclick="alert('La actividad ha sido eliminada definitivamente del sistema.');" class="btn btn-dark px-4">
                    Eliminar definitivamente
                </button>

            </form>
        </div>

    </div>
</section>

</body>
</html>
