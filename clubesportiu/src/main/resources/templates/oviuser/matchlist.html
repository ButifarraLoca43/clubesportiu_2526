<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Mis solicitudes</title>
</head>
<body>

<section layout:fragment="content">

    <h1>Mis solicitudes de asistencia</h1>

    <div th:if="${#lists.isEmpty(request)}" class="alert alert-info text-dark" style="color: #000000 !important; font-weight: 500;">
        No tienes solicitudes registradas.
    </div>

    <table th:if="${!#lists.isEmpty(request)}" class="table table-striped">
        <thead style="background-color: #0e6a89 !important; color: white !important;">
        <tr>
            <th style="background-color: transparent !important; color: white !important;">Soporte</th>
            <th style="background-color: transparent !important; color: white !important;">Descripción</th>
            <th style="background-color: transparent !important; color: white !important;">Requisitos</th>
            <th style="background-color: transparent !important; color: white !important;">Proyecto de vida</th>
            <th style="background-color: transparent !important; color: white !important;">Estado</th>
            <th style="background-color: transparent !important; color: white !important;">Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="rm : ${request}">
            <td th:text="${rm.requiredsupport}"></td>
            <td th:text="${rm.description}"></td>
            <td th:text="${rm.requirements}"></td>
            <td th:text="${rm.lifeproject}"></td>

            <td>
                <span th:if="${#strings.toString(rm.estado) == 'rechazado'}"
                      class="badge rounded-pill me-3 px-3 py-2 shadow-sm fs-6" style="background-color: #C82333; color: #FFFFFF;">Denegada</span>

                <span th:if="${#strings.toString(rm.estado) != 'rechazado' and matchedRequestIds.contains(rm.idnumber)}"
                      class="badge bg-success fs-6">Asignada</span>

                <span th:if="${#strings.toString(rm.estado) != 'rechazado' and !matchedRequestIds.contains(rm.idnumber)}"
                      class="badge bg-secondary fs-6">Pendiente</span>
            </td>

            <td>
                <a th:if="${!matchedRequestIds.contains(rm.idnumber) and #strings.toString(rm.estado) != 'rechazado'}"
                   th:href="@{/requestAssist/update/{idnumber}(idnumber=${rm.idnumber})}"
                   class="btn btn-primary btn-sm">
                    Editar solicitud
                </a>

                <a th:if="${matchedRequestIds.contains(rm.idnumber) and #strings.toString(rm.estado) != 'rechazado'}"
                   th:href="@{/oviuser/listAsignaciones/{id}(id=${rm.idnumber})}"
                   class="btn btn-primary">
                    Ver Asistentes asignados
                </a>

                <span th:if="${#strings.toString(rm.estado) == 'rechazado'}"
                      class="text-muted fst-italic">
                    Ninguna acción disponible
                </span>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/oviuser/panel}" class="btn btn-secondary btn-sm mt-2">Volver</a>

</section>
</body>
</html>
