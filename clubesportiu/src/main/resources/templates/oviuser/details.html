<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Detalles OVI User</title>
</head>
<body>
<section layout:fragment="content">

    <h1>Detalles del Miembro de la OVI</h1>

    <div class="card">
        <div class="card-body">


            <div class="row mb-4">
                <div class="col-md-6">
                    <h5 class="text-muted mb-3">Información Personal</h5>
                    <p><strong>DNI:</strong> <span th:text="${oviuser.idNumber}"></span></p>
                    <p><strong>Nombre:</strong> <span th:text="${oviuser.name}"></span></p>
                    <p><strong>Apellidos:</strong> <span th:text="${oviuser.surname}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${oviuser.email}"></span></p>
                </div>
                <div class="col-md-6">
                    <h5 class="text-muted mb-3">Contacto</h5>
                    <p><strong>Teléfono:</strong> <span th:text="${oviuser.phoneNumber}"></span></p>
                    <p><strong>Dirección:</strong> <span th:text="${oviuser.address}"></span></p>
                    <p><strong>Fecha de nacimiento:</strong> <span th:text="${#temporals.format(oviuser.dateBirth, 'dd/MM/yyyy')}"></span></p>
                </div>
            </div>

            <hr>


            <div class="row mb-4">
                <div class="col-12">
                    <h5 class="text-muted mb-3">Información de Diversidad</h5>
                    <p><strong>Tipo de diversidad funcional:</strong> <span th:text="${oviuser.funcDiversity}"></span></p>
                    <p><strong>Grado de dependencia:</strong> <span th:text="${oviuser.dependencyGrade}"></span></p>
                </div>
            </div>





        </div>
    </div>



    <div class="row mt-4 w-100 mx-0">
        <div class="col-4 text-start px-0">
            <a href="/oviuser/list" class="btn btn-secondary">Volver</a>
        </div>

        <div class="col-4 text-center px-0">
            <a th:href="@{/oviuser/update/{idNumber}(idNumber=${oviuser.idNumber})}" class="btn btn-warning">Editar</a>
        </div>

        <div class="col-4 text-end px-0">
            <a th:href="@{/oviuser/delete/{idNumber}(idNumber=${oviuser.idNumber})}" class="btn btn-danger">Eliminar</a>
        </div>

</section>
</body>
</html>
