<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Pedir asistencia</title>
</head>
<body>
<section layout:fragment="content">
    <h1 class="mt-4">Registrar petición de asistencia</h1>

    <form action="#" th:action="@{/requestAssist/add}" th:object="${requestAssist}" method="post" class="mt-4">

        <div class="form-group">
            <label for="iduser" hidden>DNI / NIE:</label>
            <input type="text" class="form-control" th:field="*{iduser}" id="iduser" maxlength="9" readonly hidden/>
            <p th:if="${#fields.hasErrors('iduser')}" th:errors="*{iduser}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
        </div>

        <div class="form-group">
            <label for="date">Fecha:</label>
            <input type="date" class="form-control" th:field="*{date}" id="date" />
            <p th:if="${#fields.hasErrors('date')}" th:errors="*{date}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>

        </div>

        <div class="form-group">
            <label for="requiredsupport">Tipo de apoyo requerido:</label>
            <input type="text" class="form-control" th:field="*{requiredsupport}" id="requiredsupport" placeholder="Tipo de apoyo" />
            <p th:if="${#fields.hasErrors('requiredsupport')}" th:errors="*{requiredsupport}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>

        </div>

        <div class="form-group">
            <label for="description">Descripción:</label>
            <textarea class="form-control" th:field="*{description}" id="description" rows="3" placeholder="Descripción de la solicitud"></textarea>
            <p th:if="${#fields.hasErrors('description')}" th:errors="*{description}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>

        </div>

        <div class="form-group">
            <label for="requirements">Requisitos:</label>
            <textarea class="form-control" th:field="*{requirements}" id="requirements" rows="3" placeholder="Requisitos"></textarea>
            <p th:if="${#fields.hasErrors('requirements')}" th:errors="*{requirements}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>

        </div>

        <div class="form-group">
            <label for="lifeproject">Proyecto de vida (enlace a Drive, Dropbox...):</label>
            <textarea class="form-control" th:field="*{lifeproject}" id="lifeproject" rows="3" placeholder="Enlace a el archivo pdf en una nube como Google Drive o DropBox"></textarea>
            <p th:if="${#fields.hasErrors('lifeproject')}" th:errors="*{lifeproject}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
        </div>

        <div class="mt-4 d-flex justify-content-between align-items-center">
            <a th:href="@{/oviuser/panel}" class="btn btn-secondary">Cancelar</a>
            <button type="button" class="btn btn-primary"
                    data-bs-toggle="modal" data-bs-target="#confirmModal">
                Enviar solicitud
            </button>

        </div>


        <div class="modal fade" id="confirmModal" tabindex="-1"
             aria-labelledby="confirmModalLabel"
             aria-describedby="confirmModalDesc">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title fs-5" id="confirmModalLabel">Confirmar envío</h2>
                        <button type="button" class="btn-close" data-bs-dismiss="modal">
                            <span class="visually-hidden">Cerrar</span>
                        </button>
                    </div>
                    <div class="modal-body" id="confirmModalDesc">
                        ¿Estás seguro de que deseas enviar la solicitud de asistencia?
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            Cancelar
                        </button>
                        <button type="submit" class="btn btn-primary">
                            Sí, enviar
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </form>


</section>
</body>
</html>
