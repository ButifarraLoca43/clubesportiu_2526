<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>OVIUser</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<table class="table">
    <thead>
    <tr>
        <th scope="col">Nombre</th>
        <th scope="col">DNI</th>
        <th scope="col">Acciones</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="user: ${oviusers}">
        <td th:text="${user.name}"></td>
        <td th:text="${user.idNumber}"></td>
        <td>
            <a th:href="@{/oviuser/update/{id}(id=${user.idNumber})}">Editar</a>
            <a th:href="@{/oviuser/delete/{id}(id=${user.idNumber})}">Borrar</a>
        </td>
    </tr>
    </tbody>
</table>
<a href="add" class="btn btn-success">Afegeix classificació</a>
<br><br>
<a href="/" class="btn btn-info">Tornar</a>

</body>
</html>
