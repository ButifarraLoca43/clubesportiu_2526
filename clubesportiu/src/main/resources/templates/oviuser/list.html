<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Listado OVI User</title>
</head>

<body>
<section layout:fragment="content">

    <h1>Listado de miembro de la OVI</h1>

    <div class="mb-3 text-end">
        <a th:href="@{/tecnico/ovimanagement}" class="btn btn-primary">
            Gestionar registros
        </a>
    </div>

    <table class="table table-striped">
        <thead style="background-color: #0e6a89 !important; color: white !important;">
        <tr>
            <th style="background-color: transparent !important; color: white !important;">DNI</th>
            <th style="background-color: transparent !important; color: white !important;">Nombre</th>
            <th style="background-color: transparent !important; color: white !important;">Apellidos</th>
            <th style="background-color: transparent !important; color: white !important;">Email</th>
            <th style="background-color: transparent !important; color: white !important;">Teléfono</th>
            <th style="background-color: transparent !important; color: white !important;">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user: ${oviusers}">
            <td th:text="${user.idNumber}"></td>
            <td th:text="${user.name}"></td>
            <td th:text="${user.surname}"></td>
            <td th:text="${user.email}"></td>
            <td th:text="${user.phoneNumber}"></td>

            <td>
                <a th:href="@{/oviuser/details/{id}(id=${user.idNumber})}"
                   class="btn btn-info btn-sm">Más información</a>

            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/tecnico/panel}"
       class="btn btn-secondary btn-sm">Volver</a>

</section>

</body>
</html>
