<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Listado OVIUser</title>
</head>

<body>
<section layout:fragment="content">

    <h1>Listado de OVI Usres</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th scope="col">Nombre</th>
            <th scope="col">DNI</th>
            <th scope="col">Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="user: ${oviusers}">
            <td th:text="${user.name}"></td>
            <td th:text="${user.idNumber}"></td>
            <td>
                <a th:href="@{/oviuser/update/{id}(id=${user.idNumber})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/oviuser/delete/{id}(id=${user.idNumber})}" class="btn btn-danger btn-sm">Borrar</a>
            </td>
        </tr>
        </tbody>
    </table>
<a href="add" class="btn btn-success">Afegeix classificació</a>
<br><br>
<a href="/" class="btn btn-info">Tornar</a>

</section>

</body>
</html>
