<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Inscripción Externa</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm">
        <div class="card shadow-sm mx-auto" style="max-width: 600px;">
            <div class="card-header bg-success text-white">
                <h1 class="h4 mb-0">Completa tus datos para inscribirte</h1>
            </div>

            <div class="card-body">
                <p class="text-muted">Parece que no has iniciado sesión. Introduce tus datos a continuación para apuntarte a la actividad como un agente externo a la SgOVI.</p>

                <form th:action="@{/inscription/externo/{id}(id=${idActivity})}" th:object="${externalUser}" method="post">

                    <div class="mb-3">
                        <label for="idnumber" class="form-label">DNI / NIE</label>
                        <input id="idnumber" type="text" th:field="*{idnumber}" class="form-control" required maxlength="9" />
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="name" class="form-label">Nombre</label>
                            <input id="name" type="text" th:field="*{name}" class="form-control" required maxlength="50"/>
                        </div>
                        <div class="col-md-6">
                            <label for="surname" class="form-label">Apellidos</label>
                            <input id="surname" type="text" th:field="*{surname}" class="form-control" required maxlength="50"/>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="email" class="form-label">Email</label>
                            <input id="email" type="email" th:field="*{email}" class="form-control" required maxlength="100"/>
                        </div>
                        <div class="col-md-6">
                            <label for="phonenumber" class="form-label">Teléfono</label>
                            <input id="phonenumber" type="text" th:field="*{phonenumber}" class="form-control" required maxlength="15"/>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="/activity/listInscripciones" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-success">Confirmar Inscripción</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</section>
</body>
</html>
