<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Listado de OviUsers</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<main class="container">
    <h1>Listado de OviUsers</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Email</th>
            <th>Edad</th>
            <th>Teléfono</th>
            <th>Acciones</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="u : ${oviusers}">
            <td th:text="${u.nombre}"></td>
            <td th:text="${u.apellidos}"></td>
            <td th:text="${u.email}"></td>
            <td th:text="${u.edad}"></td>
            <td th:text="${u.telefono}"></td>

            <!-- Botones de acción -->
            <td>
                <a th:href="@{/oviuser/update/{id}(id=${u.id})}" class="btn btn-warning btn-sm">Editar</a>
                <a th:href="@{/oviuser/delete/{id}(id=${u.id})}" class="btn btn-danger btn-sm">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>

    <a href="/oviuser/add" class="btn btn-success">Añadir OviUser</a>
    <br><br>
    <a href="/" class="btn btn-info">Volver</a>
</main>
</body>
</html>
