<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Eliminar OviUser</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>
<body>
<div class="container">
    <h1>Eliminar OviUser</h1>

    <div class="alert alert-danger">
        <p>¿Seguro que deseas eliminar este usuario?</p>
        <p><strong th:text="${oviuser.nombre + ' ' + oviuser.apellidos}"></strong></p>
    </div>

    <form th:action="@{/oviuser/delete}" method="post">
        <input type="hidden" th:field="${oviuser.id}" name="id"/>

        <button type="submit" class="btn btn-danger">Eliminar</button>
        <a href="/oviuser/list" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
