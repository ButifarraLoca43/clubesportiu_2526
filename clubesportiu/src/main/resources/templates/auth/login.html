<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Iniciar Sesión</title>
</head>
<body>
<section layout:fragment="content">
    <div class="row justify-content-center align-items-center">
        <div class="col-md-5 col-lg-4">

            <div class="card bg-secondary rounded-4 overflow-hidden" style="max-width: 25rem;">
                <div class="card-header">
                    <h1 class="h6 mb-0">Inicio de sesión</h1>
                </div>
                <div class="card-body p-4 p-md-4">
                    <form action="#" th:action="@{/login}" th:object="${user}" method="post">

                        <div class="form-floating mb-3">
                            <input type="text" th:field="*{userName}" class="form-control" id="userInput" placeholder="Usuario" required>
                            <label for="userInput"><i class="bi bi-person me-2"></i>Usuario</label>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="password" th:field="*{userPassword}" class="form-control" id="passInput" placeholder="Contraseña" required>
                            <label for="passInput"><i class="bi bi-lock me-2"></i>Contraseña</label>
                            <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('userPassword')}" th:errors="*{userPassword}" style="color: #b90000 !important;"></div>
                        </div>

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm fw-bold">
                                Entrar
                            </button>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>

    <div th:if="${modalMessage != null}" class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5">Notificación de Acceso</h2>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body" th:text="${modalMessage}">
                    Mensaje por defecto.
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-primary" data-bs-dismiss="modal">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script th:if="${modalMessage != null}">
        document.addEventListener("DOMContentLoaded", function() {
            var myModal = new bootstrap.Modal(document.getElementById('statusModal'));
            myModal.show();
        });
    </script>

</section>
</body>
</html>
