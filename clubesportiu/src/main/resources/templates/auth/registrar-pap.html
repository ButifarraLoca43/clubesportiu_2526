<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Añadir PAP/PATI</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container">
        <h1 class="text-center text-success fw-bold mb-4">Añadir PAP/PATI</h1>
        <hr>

        <form th:action="@{/pap_pati/add}" th:object="${pap_pati}" method="post">

            <div class="row">
                <div class="mb-3 col-md-4">
                    <label for="idNumber" class="form-label">DNI *</label>
                    <input id="idNumber" type="text" th:field="*{idNumber}" class="form-control" maxlength="10" required />
                    <div th:if="${#fields.hasErrors('idNumber')}" th:errors="*{idNumber}" class="text-danger small"></div>
                </div>

                <div class="mb-3 col-md-4">
                    <label for="userName" class="form-label">Nombre de Usuario *</label>
                    <input id="userName" type="text" th:field="*{userName}" class="form-control" maxlength="50" required />
                    <div th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="text-danger small"></div>
                </div>

                <div class="mb-3 col-md-4">
                    <label for="userPassword" class="form-label">Contraseña *</label>
                    <input id="userPassword" type="password" th:field="*{userPassword}" class="form-control" maxlength="255" required />
                    <div th:if="${#fields.hasErrors('userPassword')}" th:errors="*{userPassword}" class="text-danger small"></div>
                </div>
            </div>

            <div class="row">
                <div class="mb-3 col-md-4">
                    <label for="name" class="form-label">Nombre *</label>
                    <input id="name" type="text" th:field="*{name}" class="form-control" maxlength="50" required />
                    <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger small"></div>
                </div>

                <div class="mb-3 col-md-4">
                    <label for="surname" class="form-label">Apellidos *</label>
                    <input id="surname" type="text" th:field="*{surname}" class="form-control" maxlength="50" required />
                    <div th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="text-danger small"></div>
                </div>

                <div class="mb-3 col-md-4">
                    <label for="email" class="form-label">Email *</label>
                    <input id="email" type="email" th:field="*{email}" class="form-control" maxlength="100" required />
                    <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger small"></div>
                </div>
            </div>

            <div class="row">
                <div class="mb-3 col-md-4">
                    <label for="dateBirth" class="form-label">Fecha de nacimiento *</label>
                    <input id="dateBirth" type="date" th:field="*{dateBirth}" class="form-control" required />
                    <div th:if="${#fields.hasErrors('dateBirth')}" th:errors="*{dateBirth}" class="text-danger small"></div>
                </div>

                <div class="mb-3 col-md-4">
                    <label for="phoneNumber" class="form-label">Teléfono *</label>
                    <input id="phoneNumber" type="text" th:field="*{phoneNumber}" class="form-control" maxlength="15" required />
                    <div th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="text-danger small"></div>
                </div>

                <div class="mb-3 col-md-4">
                    <label for="address" class="form-label">Dirección</label>
                    <input id="address" type="text" th:field="*{address}" class="form-control" maxlength="50" />
                    <div th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="text-danger small"></div>
                </div>
            </div>

            <div class="row">
                <div class="mb-3 col-md-6">
                    <label for="experience" class="form-label">Experiencia</label>
                    <textarea id="experience" th:field="*{experience}" class="form-control" rows="3"></textarea>
                </div>
                <div class="mb-3 col-md-6">
                    <label for="curriculumVitae" class="form-label">Curriculum Vitae</label>
                    <textarea id="curriculumVitae" th:field="*{curriculumVitae}" class="form-control" rows="3"></textarea>
                </div>
            </div>

            <div class="mt-3 d-flex justify-content-between align-items-center">
                <div>
                    <button type="submit" class="btn btn-primary">Añadir PAP/PATI</button>
                    <a th:href="@{/pap_pati/list}" class="btn btn-secondary">Cancelar</a>
                </div>

                <p class="text-muted small mb-0">
                    Rellene los datos del nuevo usuario. Los campos con asterisco (*) son obligatorios.
                </p>
            </div>
        </form>
    </div>
</section>
</body>
</html>
