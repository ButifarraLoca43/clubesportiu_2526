<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Registrarse como miembro de la OVI</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container">
        <h2 class="mt-4">Registrase como miembro de la OVI</h2>

        <form action="#" th:action="@{/registrar/ovi}" th:object="${oviuser}" method="post" class="mt-4">

            <div class="row">
                <div class="form-group col-md-4">
                    <label for="idNumber">DNI / NIE:</label>
                    <input type="text" class="form-control" th:field="*{idNumber}" id="idNumber" maxlength="9"/>
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('idNumber')}" th:errors="*{idNumber}" style="color: #b90000 !important;"></div>
                </div>

                <div class="form-group col-md-4">
                    <label for="name">Nombre:</label>
                    <input type="text" class="form-control" th:field="*{name}" id="name"/>
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: #b90000 !important;"></div>
                </div>

                <div class="form-group col-md-4">
                    <label for="surname">Apellidos:</label>
                    <input type="text" class="form-control" th:field="*{surname}" id="surname" />
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" style="color: #b90000 !important;"></div>
                </div>
            </div>

            <div class="row">
                <div class="form-group col-md-4">
                    <label for="dateBirth">Fecha de Nacimiento:</label>
                    <input type="date" class="form-control" th:field="*{dateBirth}" id="dateBirth"/>
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('dateBirth')}" th:errors="*{dateBirth}" style="color: #b90000 !important;"></div>
                </div>

                <div class="form-group col-md-4">
                    <label for="email">Correo Electrónico:</label>
                    <input type="email" class="form-control" th:field="*{email}" id="email" />
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: #b90000 !important;"></div>
                </div>

                <div class="form-group col-md-4">
                    <label for="phoneNumber">Teléfono:</label>
                    <input type="text" class="form-control" th:field="*{phoneNumber}" id="phoneNumber" maxlength="9"/>
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" style="color: #b90000 !important;"></div>
                </div>
            </div>

            <div class="form-group">
                <label for="address">Dirección completa:</label>
                <input type="text" class="form-control" th:field="*{address}" id="address" />
                <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}" style="color: #b90000 !important;"></div>
            </div>

            <div class="row">
                <div class="form-group col-md-6">
                    <label for="funcDiversity">Tipo de Diversidad Funcional:</label>
                    <select class="form-control" th:field="*{funcDiversity}" id="funcDiversity">
                        <option value="">-- Seleccione un tipo --</option>
                        <option th:each="type : ${diversityList}"
                                th:value="${type}" th:text="${type}"></option>
                    </select>
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('funcDiversity')}" th:errors="*{funcDiversity}" style="color: #b90000 !important;"></div>
                </div>

                <div class="form-group col-md-6">
                    <label for="dependencyGrade">Grado de Dependencia (1-3):</label>
                    <input type="number" class="form-control" th:field="*{dependencyGrade}" id="dependencyGrade" min="1" max="3" />
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('dependencyGrade')}" th:errors="*{dependencyGrade}" style="color: #b90000 !important;"></div>
                </div>
            </div>

            <hr/>
            <h4>Datos de Acceso</h4>
            <div class="row">
                <div class="form-group col-md-6">
                    <label for="userName">Nombre de Usuario:</label>
                    <input type="text" class="form-control" th:field="*{userName}" id="userName" />
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" style="color: #b90000 !important;"></div>
                </div>

                <div class="form-group col-md-6">
                    <label for="userPassword">Contraseña:</label>
                    <input type="password" class="form-control" th:field="*{userPassword}" id="userPassword" />
                    <div class="text-danger small fw-bold mt-1" th:if="${#fields.hasErrors('userPassword')}" th:errors="*{userPassword}" style="color: #b90000 !important;"></div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-4 border-top pt-3">

                <a href="#" onclick="alert('El registro ha sido cancelado. El usuario NO se ha guardado.'); window.history.back(); return false;" class="btn btn-secondary px-4">
                    Cancelar
                </a>

                <button type="submit" onclick="alert('Te has registrado correctamente como miembro de la OVI.');" class="btn btn-primary px-4" style="background-color: #106b86 !important; border-color: #106b86 !important;">
                    Guardar Usuario
                </button>

            </div>
        </form>
    </div>
</section>
</body>
</html>
