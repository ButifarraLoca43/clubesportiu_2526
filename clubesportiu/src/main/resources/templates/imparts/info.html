<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Información del Instructor</title>
</head>
<body>
<section layout:fragment="content">
    <div class="card p-4 shadow-sm max-w-lg mx-auto">

        <div class="border-bottom pb-3 mb-4">
            <span class="text-muted small text-uppercase fw-bold">Perfil del Instructor</span>
            <h1 class="h3 mb-0" th:text="${instructor.name + ' ' + instructor.surname}">Nombre del Instructor</h1>
        </div>

        <div class="row g-4">
            <div class="col-md-6">
                <div class="p-3 bg-light rounded h-100">
                    <h2 class="h6 text-secondary border-bottom pb-2 mb-3">👤 Información Personal</h2>
                    <p class="mb-2"><strong>DNI / ID:</strong> <span th:text="${instructor.idNumber}"></span></p>
                    <p class="mb-2"><strong>Fecha de Nacimiento:</strong> <span th:text="${#temporals.format(instructor.dateBirth, 'dd/MM/yyyy')}"></span></p>
                </div>
            </div>

            <div class="col-md-6">
                <div class="p-3 bg-light rounded h-100">
                    <h2 class="h6 text-secondary border-bottom pb-2 mb-3">📞 Contacto</h2>
                    <p class="mb-2"><strong>Teléfono:</strong> <span th:text="${instructor.phoneNumber}"></span></p>

                    <p class="mb-2"><strong>Email:</strong>
                        <a th:href="'mailto:' + ${instructor.email}" th:text="${instructor.email}"
                           style="color: #106b86 !important; font-weight: 600; text-decoration: none;"></a>
                    </p>

                    <p class="mb-2"><strong>Dirección:</strong> <span th:text="${instructor.address}"></span></p>
                </div>
            </div>

            <div class="col-12">
                <div class="p-3 bg-light rounded">
                    <h2 class="h6 text-secondary border-bottom pb-2 mb-3">🎓 Perfil Profesional</h2>
                    <div class="mb-3">
                        <strong>Formación:</strong>
                        <p class="mt-1 mb-0 text-muted" th:text="${instructor.formation}"></p>
                    </div>
                    <div>
                        <strong>Experiencia:</strong>
                        <p class="mt-1 mb-0 text-muted" th:text="${instructor.experience}"></p>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-4 pt-2">
            <button onclick="history.back()" class="btn btn-secondary px-4">
                <i class="bi bi-arrow-left me-1"></i> Volver atrás
            </button>
        </div>

    </div>
</section>
</body>
</html>
