<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Añadir Instructor</title>
</head>
<body>

<section layout:fragment="content">

    <div class="card p-4 shadow-sm border-0">

        <h1>Registrar Nuevo Instructor</h1>

        <form action="#" th:action="@{/instructor/add}" th:object="${instructor}" method="post">

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label for="idNumber" class="form-label fw-bold">DNI / NIE:</label>
                    <input type="text" class="form-control" th:field="*{idNumber}" id="idNumber" maxlength="9"/>
                    <p th:if="${#fields.hasErrors('idNumber')}" th:errors="*{idNumber}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-4">
                    <label for="name" class="form-label fw-bold">Nombre:</label>
                    <input type="text" class="form-control" th:field="*{name}" id="name"/>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-4">
                    <label for="surname" class="form-label fw-bold">Apellidos:</label>
                    <input type="text" class="form-control" th:field="*{surname}" id="surname" />
                    <p th:if="${#fields.hasErrors('surname')}" th:errors="*{surname}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-4">
                    <label for="dateBirth" class="form-label fw-bold">Fecha de Nacimiento:</label>
                    <input type="date" class="form-control" th:field="*{dateBirth}" id="dateBirth"/>
                    <p th:if="${#fields.hasErrors('dateBirth')}" th:errors="*{dateBirth}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-4">
                    <label for="email" class="form-label fw-bold">Correo Electrónico:</label>
                    <input type="email" class="form-control" th:field="*{email}" id="email" />
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-4">
                    <label for="phoneNumber" class="form-label fw-bold">Teléfono:</label>
                    <input type="text" class="form-control" th:field="*{phoneNumber}" id="phoneNumber" maxlength="9"/>
                    <p th:if="${#fields.hasErrors('phoneNumber')}" th:errors="*{phoneNumber}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>
            </div>

            <div class="mb-3">
                <label for="address" class="form-label fw-bold">Dirección completa:</label>
                <input type="text" class="form-control" th:field="*{address}" id="address" />
                <p th:if="${#fields.hasErrors('address')}" th:errors="*{address}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="formation" class="form-label fw-bold">Formación:</label>
                    <input type="text" class="form-control" th:field="*{formation}" id="formation"/>
                    <p th:if="${#fields.hasErrors('formation')}" th:errors="*{formation}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-6">
                    <label for="experience" class="form-label fw-bold">Experiencia:</label>
                    <input type="text" class="form-control" th:field="*{experience}" id="experience" />
                    <p th:if="${#fields.hasErrors('experience')}" th:errors="*{experience}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>
            </div>

            <hr class="text-muted"/>

            <h2>Datos de Acceso</h2>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="userName" class="form-label fw-bold">Nombre de Usuario:</label>
                    <input type="text" class="form-control" th:field="*{userName}" id="userName" />
                    <p th:if="${#fields.hasErrors('userName')}" th:errors="*{userName}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>

                <div class="col-md-6">
                    <label for="userPassword" class="form-label fw-bold">Contraseña:</label>
                    <input type="password" class="form-control" th:field="*{userPassword}" id="userPassword" />
                    <p th:if="${#fields.hasErrors('userPassword')}" th:errors="*{userPassword}" class="small mt-1 fw-bold" style="color: #b90000 !important;"></p>
                </div>
            </div>

            <div class="d-flex justify-content-between border-top pt-4 mt-2">
                <a th:href="@{/instructor/list}" class="btn btn-secondary px-4">Cancelar</a>
                <button type="submit" class="btn text-white px-4" style="background-color: #106b86 !important; border-color: #106b86 !important;">Guardar Usuario</button>
            </div>
        </form>
    </div>

</section>
</body>
</html>
