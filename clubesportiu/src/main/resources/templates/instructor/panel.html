<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Panel de Instructor</title>
</head>
<body>

<section layout:fragment="content">

    <div class="card overflow-hidden shadow-sm">
        <div class="row g-0">
            <div class="col-md-4 d-flex align-items-center justify-content-center bg-light p-5">
                <h2 class="text-primary fw-bold text-center">Panel de Control Instructor</h2>
            </div>

            <div class="col-md-8">

                <a th:href="@{/instructor/update}" class="text-decoration-none text-dark">

                    <a th:href="@{/instructor/editar}" class="text-decoration-none text-dark">
                        <div class="p-4 border-bottom option-row">
                            <h5 class="text-primary fw-bold">Editar Perfil</h5>
                            <p class="mb-0 text-muted">Actualiza tu información personal y datos de contacto</p>
                        </div>
                    </a>

                <a th:href="@{/activity/listPedirActividad}" class="text-decoration-none text-dark">
                    <div class="p-4 border-bottom option-row">
                        <h5 class="text-primary fw-bold">Catálogo de Actividades</h5>
                        <p class="mb-0 text-muted">Explora el catálogo general y solicita impartir nuevas actividades</p>
                    </div>
                </a>

                <a th:href="@{/activity/listMisActividadesInstructor}" class="text-decoration-none text-dark">
                    <div class="p-4 option-row">
                        <h5 class="text-primary fw-bold">Mis Actividades</h5>
                        <p class="mb-0 text-muted">Gestiona, revisa y organiza las actividades que estás impartiendo actualmente</p>
                    </div>
                </a>

            </div>
        </div>
    </div>

</section>

</body>
</html>
