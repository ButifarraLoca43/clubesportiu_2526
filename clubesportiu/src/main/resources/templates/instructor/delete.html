<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Eliminar Instructor</title>
    <style>
        /* Forzamos colores seguros para accesibilidad
           El asterisco (*) asegura que NINGÚN estilo global sobreescriba el texto
        */
        .alerta-segura {
            background-color: #fff3cd !important; /* Amarillo muy pálido */
            border: 1px solid #ffe69c !important;
            border-left: 5px solid #ffc107 !important; /* Borde izquierdo para darle estilo */
        }
        .alerta-segura, .alerta-segura * {
            color: #000000 !important; /* Texto negro puro obligatorio */
        }
    </style>
</head>
<body>

<section layout:fragment="content">
    <div class="card p-4 shadow-sm border-0">

        <h1>Confirmar Eliminación</h1>

        <div class="alert alerta-segura shadow-sm mb-4">

            <h2 class="h5 alert-heading fw-bold">¿Estás seguro de que deseas eliminar a este instructor?</h2>

            <p>Esta acción es irreversible y el instructor desaparecerá definitivamente de la base de datos.</p>
            <hr style="border-color: #ccc;">

            <div class="row">
                <div class="col-md-6 mb-2">
                    <strong>DNI:</strong> <span th:text="${instructor.idNumber}"></span>
                </div>
                <div class="col-md-6 mb-2">
                    <strong>Nombre:</strong> <span th:text="${instructor.name}"></span>
                </div>
                <div class="col-md-6 mb-2">
                    <strong>Apellidos:</strong> <span th:text="${instructor.surname}"></span>
                </div>
                <div class="col-md-6 mb-2">
                    <strong>Email:</strong> <span th:text="${instructor.email}"></span>
                </div>
            </div>
        </div>

        <div class="border-top pt-4 mt-2">
            <form th:action="@{/instructor/delete/{idNumber}(idNumber=${instructor.idNumber})}" method="post" class="d-flex justify-content-between w-100 mt-3">

                <a th:href="@{/instructor/list}" onclick="alert('La acción ha sido cancelada. El instructor NO se ha eliminado.');" class="btn btn-secondary px-4">
                    Cancelar
                </a>

                <button type="submit" onclick="alert('El instructor ha sido eliminado definitivamente del sistema.');" class="btn btn-dark px-4">
                    Eliminar definitivamente
                </button>

            </form>
        </div>

    </div>
</section>

</body>
</html>
