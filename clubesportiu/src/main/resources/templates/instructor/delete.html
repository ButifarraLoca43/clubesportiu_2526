<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Eliminar Instructor</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

</head>

<body>
<main class="container mt-4">

    <h1 class="mb-4">Eliminar Instructor</h1>

    <div class="alert alert-danger">
        <p>¿Seguro que deseas eliminar este Instructor?</p>

        <ul>
            <li><strong>DNI:</strong> <span th:text="${instructor.idNumber}"></span></li>
            <li><strong>Nombre:</strong> <span th:text="${instructor.name}"></span></li>
            <li><strong>Apellidos:</strong> <span th:text="${instructor.surname}"></span></li>
            <li><strong>Email:</strong> <span th:text="${instructor.email}"></span></li>
        </ul>
    </div>


    <form th:action="@{/instructor/delete/{idNumber}(idNumber=${instructor.idNumber})}" method="post">
        <button type="submit" class="btn btn-danger">Eliminar definitivamente</button>
        <a th:href="@{/instructor/list}" class="btn btn-secondary">Cancelar</a>
    </form>

</main>
</body>
</html>
