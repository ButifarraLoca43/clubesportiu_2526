<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Listado Instructores</title>
</head>
<body>
<section layout:fragment="content">

    <h1>Listado de Instructores</h1>

    <div th:if="${mensajeDenegado}" class="modal d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5); z-index: 1055;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5">Acción no permitida</h2>
                    <a th:href="@{/instructor/list}" class="btn-close" aria-label="Cerrar"></a>
                </div>
                <div class="modal-body text-start mt-2">
                    <p class="fs-6" th:text="${mensajeDenegado}"></p>
                </div>
                <div class="modal-footer border-0">
                    <a th:href="@{/instructor/list}" class="btn btn-primary">OK</a>
                </div>
            </div>
        </div>
    </div>

    <div th:if="${mensajeExito}" class="alert alert-success mt-3" role="alert">
        <span th:text="${mensajeExito}"></span>
    </div>

    <table class="table table-striped">
        <thead style="background-color: #0e6a89 !important; color: white !important;">
        <tr>
            <th style="background-color: transparent !important; color: white !important;">DNI</th>
            <th style="background-color: transparent !important; color: white !important;">Nombre</th>
            <th style="background-color: transparent !important; color: white !important;">Apellidos</th>
            <th style="background-color: transparent !important; color: white !important;">Teléfono</th>
            <th style="background-color: transparent !important; color: white !important;">Email</th>
            <th style="background-color: transparent !important; color: white !important;">Fecha de Nacimiento</th>
            <th style="background-color: transparent !important; color: white !important;">Información</th>
            <th style="background-color: transparent !important; color: white !important;">Acciones</th>

        </tr>
        </thead>

        <tbody>
        <tr th:each="i : ${instructors}">
            <td th:text="${i.idNumber}"></td>
            <td th:text="${i.name}"></td>
            <td th:text="${i.surname}"></td>
            <td th:text="${i.phoneNumber}"></td>
            <td th:text="${i.email}"></td>

            <td th:text="${i.dateBirth != null ? #temporals.format(i.dateBirth, 'dd/MM/yyyy') : ''}"></td>

            <td>
                <a th:href="@{/imparts/info/{id}(id=${i.idNumber})}"
                   class="btn btn-sm text-white"
                   style="background-color: #106b86 !important; border-color: #106b86 !important; white-space: nowrap;">Más información</a>
            </td>

            <td>
                <div class="d-flex gap-1">
                    <a th:href="@{/instructor/update/{idNumber}(idNumber=${i.idNumber})}"
                       class="btn btn-warning btn-sm">Editar</a>

                    <a th:href="@{/instructor/delete/{idNumber}(idNumber=${i.idNumber})}"
                       class="btn btn-danger btn-sm">Eliminar</a>
                </div>
            </td>
        </tr>
        </tbody>
    </table>
    <div class="row mt-4 w-100 mx-0">
        <div class="col-6 text-start px-0">
            <a href="/tecnico/panel" class="btn btn-secondary">Volver</a>
        </div>
        <div class="col-6 text-end px-0">
            <a th:href="@{/instructor/add}" class="btn btn-success mt-2">Añadir Instructor</a>
        </div>
    </div>
</section>
</body>
</html>
