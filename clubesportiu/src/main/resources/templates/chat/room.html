<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Chat de Asignación</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">

                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center py-3">
                        <h1 class="mb-0">
                            <i class="bi bi-chat-left-text-fill text-warning me-2"></i>
                            Chat con: <span th:text="${nombreContacto}" class="text-warning fw-bold">Nombre</span>
                        </h1>
                        <a th:href="@{/chat/list}" class="btn btn-secondary btn-sm">
                            <i class="bi bi-arrow-left me-1"></i>Volver atrás
                        </a>
                    </div>

                    <div class="bg-light border-bottom text-center p-2">
                        <a th:href="@{/chat/room/{id}(id=${idMatch}, name=${nombreContacto})}"
                           class="btn btn-sm btn-secondary rounded-pill px-3">
                            <i class="bi bi-arrow-clockwise"></i> Recargar para ver nuevos mensajes
                        </a>
                    </div>

                    <div class="card-body bg-light d-flex flex-column-reverse" style="height: 400px; overflow-y: auto;" id="chatBody">                        <div class="d-flex flex-column gap-3">

                            <div th:each="msg : ${messages}"
                                 th:classappend="${msg.senderType == currentUserType} ? 'align-self-end text-end' : 'align-self-start'"
                                 class="w-75">

                                <div class="p-3 rounded-3 shadow-sm text-start"
                                     th:classappend="${msg.senderType == currentUserType} ? 'text-white' : 'bg-white text-dark'"
                                     th:style="${msg.senderType == currentUserType} ? 'background-color: #106b86 !important;' : ''">

                                    <small class="d-block fw-bold mb-1"
                                           th:text="${msg.senderType == currentUserType} ? 'Tú' : ${nombreContacto}"
                                           th:classappend="${msg.senderType == currentUserType} ? 'text-white' : 'text-muted'">
                                    </small>

                                    <span th:text="${msg.messageContent}">Contenido del mensaje</span>
                                </div>

                                <small class="text-muted d-block mt-1" style="font-size: 0.75rem;"
                                       th:text="${#temporals.format(msg.timestamp, 'dd/MM/yyyy HH:mm')}">00:00</small>
                            </div>

                            <div th:if="${#lists.isEmpty(messages)}" class="text-center text-muted py-5">
                                <i class="bi bi-chat-dots display-4 text-black-50 mb-3 d-block"></i>
                                <p>No hay mensajes en este chat. ¡Comienza la conversación!</p>
                            </div>

                        </div>
                    </div>

                    <div class="card-footer bg-white py-3">
                        <form th:action="@{/chat/room/{id}/send(id=${idMatch}, name=${nombreContacto})}" th:object="${newChat}" method="post"
                              class="input-group">

                            <input type="text" th:field="*{messageContent}" id="messageContent" class="form-control"
                                   placeholder="Escribe un mensaje aquí..." aria-label="Escribe un mensaje aquí" required autocomplete="off" autofocus>

                            <button class="btn text-white px-4" type="submit" style="background-color: #106b86 !important; border-color: #106b86 !important;">
                                Enviar <i class="bi bi-send-fill ms-1"></i>
                            </button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</section>
</body>
</html>
