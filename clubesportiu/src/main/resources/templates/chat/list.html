<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Mis Conversaciones</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <h1 class="mb-4 text-primary">
                    <i class="bi bi-chat-dots-fill me-2"></i>Mis Conversaciones Activas
                </h1>

                <div class="card shadow-sm border-0">
                    <div class="list-group list-group-flush">

                        <div th:each="chat : ${chats}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-4">

                            <div>
                                <h2 class="mb-1 fw-bold text-dark" th:text="${chat.nombreContacto}">Nombre del Contacto</h2>
                            </div>

                            <a th:href="@{/chat/room/{id}(id=${chat.idMatch}, name=${chat.nombreContacto})}"
                               class="btn btn-primary rounded-pill px-4 shadow-sm">
                                Entrar al Chat <i class="bi bi-arrow-right-short ms-1"></i>
                            </a>

                        </div>

                        <div th:if="${#lists.isEmpty(chats)}" class="text-center p-5 text-muted">
                            <i class="bi bi-inbox display-4 d-block mb-3 text-secondary"></i>
                            <h2>No tienes conversaciones activas</h2>
                            <p>Tus chats aparecerán aquí cuando tengas un emparejamiento (match) asignado.</p>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</section>
</body>
</html>
