<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Mis Conversaciones</title>
</head>
<body>
<section layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <h1 class="mb-4 text-primary">
                    <i class="bi bi-chat-dots-fill me-2"></i>Mis Conversaciones Activas
                </h1>

                <div class="card shadow-sm border-0">
                    <div class="list-group list-group-flush">

                        <!-- NUEVO: Estilo condicional usando th:classappend si hay mensajes sin leer -->
                        <div th:each="chat : ${chats}"
                             class="list-group-item list-group-item-action d-flex justify-content-between align-items-center p-4"
                             th:classappend="${chat.unreadCount > 0} ? 'bg-light border-start border-primary border-4' : ''">

                            <div>
                                <h2 class="mb-1 text-dark"
                                    th:classappend="${chat.unreadCount > 0} ? 'fw-bolder' : 'fw-bold'"
                                    th:text="${chat.nombreContacto}">Nombre del Contacto</h2>

                                <!-- NUEVO: Muestra si hay nuevos mensajes -->
                                <p th:if="${chat.unreadCount > 0}" class="mb-0 fw-bold small" style="color: #C82333;">                                    <i class="bi bi-envelope-fill me-1"></i> Tienes mensajes sin leer
                                </p>
                            </div>

                            <div class="d-flex align-items-center">
                                <!-- NUEVO: Badge (globo rojo) con el número de mensajes sin leer -->
                                <span th:if="${chat.unreadCount > 0}"
                                      class="badge rounded-pill me-3 px-3 py-2 shadow-sm fs-6"
                                      style="background-color: #C82333; color: #FFFFFF;">
                                    <span aria-hidden="true" th:text="${chat.unreadCount} + ' Nuevos'">1 Nuevo</span>
                                    <span class="visually-hidden" th:text="${chat.unreadCount} + ' mensajes nuevos sin leer'">1 mensajes nuevos sin leer</span>
                                </span>

                                <a th:href="@{/chat/room/{id}(id=${chat.idMatch}, name=${chat.nombreContacto})}"
                                   class="btn btn-primary rounded-pill px-4 shadow-sm">
                                    Entrar al Chat <i class="bi bi-arrow-right-short ms-1"></i>
                                </a>
                            </div>

                        </div>

                        <div th:if="${#lists.isEmpty(chats)}" class="text-center p-5 text-muted">
                            <i class="bi bi-inbox display-4 d-block mb-3 text-secondary"></i>
                            <h2>No tienes conversaciones activas</h2>
                            <p>Tus chats aparecerán aquí cuando tengas un emparejamiento (match) asignado.</p>
                        </div>

                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-8 mt-3">
            <a th:href="@{${panelUrl}}" class="btn btn-secondary btn-sm">
                <i class="bi bi-arrow-left me-1"></i> Volver al Panel
            </a>
        </div>
    </div>
</section>
</body>
</html>
