<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Detalles PAP/PATI</title>
</head>
<body>
<section layout:fragment="content">

    <h1>Detalles del asistente personal</h1>

    <div th:if="${mensajeDenegado}" class="modal d-block" tabindex="-1" style="background-color: rgba(0,0,0,0.5); z-index: 1055;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="modal-title fs-5">Acción no permitida</h2>
                    <a th:href="@{/pap_pati/details/{idNumber}(idNumber=${pap_pati.idNumber})}" class="btn-close" aria-label="Cerrar"></a>
                </div>
                <div class="modal-body text-start mt-2">
                    <p class="fs-6" th:text="${mensajeDenegado}"></p>
                </div>
                <div class="modal-footer border-0">
                    <a th:href="@{/pap_pati/details/{idNumber}(idNumber=${pap_pati.idNumber})}" class="btn btn-primary">OK</a>
                </div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-6">
                    <h5 class="text-muted mb-3">Información Personal</h5>
                    <p><strong>DNI:</strong> <span th:text="${pap_pati.idNumber}"></span></p>
                    <p><strong>Nombre:</strong> <span th:text="${pap_pati.name}"></span></p>
                    <p><strong>Apellidos:</strong> <span th:text="${pap_pati.surname}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${pap_pati.email}"></span></p>
                </div>
                <div class="col-md-6">
                    <h5 class="text-muted mb-3">Contacto</h5>
                    <p><strong>Teléfono:</strong> <span th:text="${pap_pati.phoneNumber}"></span></p>
                    <p><strong>Dirección:</strong> <span th:text="${pap_pati.address}"></span></p>
                    <p><strong>Fecha de nacimiento:</strong> <span th:text="${#temporals.format(pap_pati.dateBirth, 'dd/MM/yyyy')}"></span></p>
                </div>
            </div>

            <hr>

            <div class="row mb-4">
                <div class="col-12">
                    <h5 class="text-muted mb-3">Información Profesional</h5>
                    <p><strong>Experiencia:</strong></p>
                    <p th:text="${pap_pati.experience}" class="ms-3"></p>

                    <p class="mt-3"><strong>Currículum Vitae:</strong></p>
                    <p class="ms-3">
                        <a th:if="${pap_pati.curriculumVitae != null and !#strings.isEmpty(pap_pati.curriculumVitae)}"
                           th:href="${pap_pati.curriculumVitae}"
                           target="_blank"
                           rel="noopener noreferrer"
                           style="color: #0a58ca !important; text-decoration: underline;"
                           class="fw-bold">
                            Ver CV
                            <span class="visually-hidden">de <th:block th:text="${pap_pati.name} + ' ' + ${pap_pati.surname}"></th:block></span>
                        </a>
                        <span th:unless="${pap_pati.curriculumVitae != null and !#strings.isEmpty(pap_pati.curriculumVitae)}"
                              class="text-muted"> Sin CV </span>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <div class="row mt-4 w-100 mx-0">
        <div class="col-4 text-start px-0">
            <a th:href="${urlVolver}" class="btn btn-secondary">Volver</a>
        </div>
        <div class="col-4 text-center px-0">
            <a th:href="@{/pap_pati/update/{idNumber}(idNumber=${pap_pati.idNumber})}" class="btn btn-warning">Editar</a>
        </div>
        <div class="col-4 text-end px-0">
            <a th:href="@{/pap_pati/delete/{idNumber}(idNumber=${pap_pati.idNumber})}" class="btn btn-danger">
                Eliminar
            </a>
        </div>
    </div>

</section>
</body>
</html>
