<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Solicitudes Activas</title>
</head>
<body>

<section layout:fragment="content">

    <h1>Solicitudes de asistencia activas</h1>

    <div th:if="${#lists.isEmpty(asignaciones)}" class="alert alert-info text-dark"
         style="color: #000000 !important; font-weight: 500;">
        No tienes ninguna propuesta de emparejamiento activa en este momento.
    </div>

    <table class="table table-hover mt-4" th:unless="${#lists.isEmpty(asignaciones)}">
        <thead style="background-color: #0e6a89 !important; color: white !important;">
        <tr>
            <th style="background-color: transparent !important; color: white !important;">Nombre</th>
            <th style="background-color: transparent !important; color: white !important;">Soporte Requerido</th>
            <th style="background-color: transparent !important; color: white !important;">Descripción</th>
            <th style="background-color: transparent !important; color: white !important;">Requisitos</th>
            <th style="background-color: transparent !important; color: white !important;">Proyecto de Vida</th>
            <th style="background-color: transparent !important; color: white !important;">Fecha de propuesta</th>
            <th style="background-color: transparent !important; color: white !important;">Contrato</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="asig : ${asignaciones}">
            <td th:text="${asig.oviname}"></td>
            <td th:text="${asig.requiredsupport}"></td>
            <td th:text="${asig.description}"></td>
            <td th:text="${asig.requirements}"></td>
            <td>
                <a th:if="${asig.lifeproject != null and asig.lifeproject != ''}"
                   th:href="${asig.lifeproject}"
                   target="_blank"
                   class="btn btn-primary btn-sm">Ver Proyecto de Vida</a>

                <span th:unless="${asig.lifeproject != null and asig.lifeproject != ''}"
                      class="text-muted">Sin CV</span>
            </td>
            <td th:text="${#temporals.format(asig['date'].toLocalDate(), 'dd/MM/yyyy')}"></td>
            <td>
                <th:block th:if="${asig['contrato'] != null}">
                    <a th:href="${asig['contrato'].url}" target="_blank"
                       class="btn btn-primary">Ver contrato</a>
                </th:block>
                <th:block th:if="${asig['contrato'] == null}">
                    <span class="text-muted small">Sin contrato</span>
                </th:block>
            </td>
        </tr>
        </tbody>
    </table>

    <a th:href="@{/pap_pati/panel}" class="btn btn-secondary btn-sm">Volver</a>

</section>
</body>
</html>
