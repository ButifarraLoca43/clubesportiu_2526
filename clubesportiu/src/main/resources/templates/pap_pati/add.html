<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Añadir PAP/PATI</title>
    <meta charset="UTF-8">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>
</head>

<body>
<main class="container mt-4">

    <h1 class="mb-4">Añadir PAP/PATI</h1>

    <form th:action="@{/pap_pati/add}" th:object="${pap_pati}" method="post">

        <!-- DNI (ID del PAP/PATI) -->
        <div class="mb-3">
            <label class="form-label">DNI</label>
            <input type="text" class="form-control" th:field="*{idNumber}" required>
        </div>

        <!-- Nombre -->
        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" class="form-control" th:field="*{name}" required>
        </div>

        <!-- Apellidos -->
        <div class="mb-3">
            <label class="form-label">Apellidos</label>
            <input type="text" class="form-control" th:field="*{surname}" required>
        </div>

        <!-- Email -->
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" required>
        </div>

        <!-- Fecha de nacimiento -->
        <div class="mb-3">
            <label class="form-label">Fecha de nacimiento</label>
            <input type="date" class="form-control" th:field="*{dateBirth}">
        </div>

        <!-- Dirección -->
        <div class="mb-3">
            <label class="form-label">Dirección</label>
            <input type="text" class="form-control" th:field="*{address}">
        </div>

        <!-- Teléfono -->
        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" class="form-control" th:field="*{phoneNumber}">
        </div>

        <!-- Experiencia -->
        <div class="mb-3">
            <label class="form-label">Experiencia</label>
            <input type="text" class="form-control" th:field="*{experience}">
        </div>

        <!-- Curriculum Vitae -->
        <div class="mb-3">
            <label class="form-label">Curriculum Vitae</label>
            <input type="text" class="form-control" th:field="*{curriculumVitae}">
        </div>

        <!-- Contraseña -->
        <div class="mb-3">
            <label class="form-label">Contraseña</label>
            <input type="password" class="form-control" th:field="*{userPassword}">
        </div>

        <!-- Botones -->
        <button type="submit" class="btn btn-success">Crear PAP/PATI</button>
        <a href="/pap_pati/list" class="btn btn-secondary">Cancelar</a>

    </form>

</main>
</body>
</html>
