<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <title>Panel de Gestión PAP/PATI</title>
    <style>
        /* Estilo idéntico al panel de OVIUser para coherencia */
        .option-card {
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border-radius: 12px;
        }
        .option-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
            background-color: #f8faff;
        }
        .icon-box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<section layout:fragment="content" class="container py-5">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="text-center mb-5">
                <i class="bi bi-person-badge text-primary" style="font-size: 3.5rem;"></i>
                <h1 class="display-5 fw-bold text-dark">Panel de Control PAP/PATI</h1>
                <p class="lead text-muted">Gestión de acompañamientos y participación en actividades.</p>
            </div>

            <div class="row g-4 justify-content-center">

                <div class="col-md-6 col-lg-4">
                    <a th:href="@{/pap_pati/acceptUsers}" class="text-decoration-none text-dark">
                        <div class="card h-100 shadow-sm border-0 option-card p-3">
                            <div class="card-body text-center">
                                <div class="icon-box bg-info bg-opacity-10 text-info mx-auto mb-3">
                                    <i class="bi bi-people fs-3"></i>
                                </div>
                                <h5 class="fw-bold">Gestión de Usuarios</h5>
                                <p class="small text-muted">Revisa y acepta solicitudes de asistencia de usuarios OVI.</p>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="col-md-6 col-lg-4">
                    <a th:href="@{/activity/list}" class="text-decoration-none text-dark">
                        <div class="card h-100 shadow-sm border-0 option-card p-3">
                            <div class="card-body text-center">
                                <div class="icon-box bg-primary bg-opacity-10 text-primary mx-auto mb-3">
                                    <i class="bi bi-calendar-check fs-3"></i>
                                </div>
                                <h5 class="fw-bold">Actividades OVI</h5>
                                <p class="small text-muted">Consulta el listado completo de actividades disponibles.</p>
                            </div>
                        </div>
                    </a>
                </div>

            </div>

            <div class="mt-5 text-center">
                <hr class="w-25 mx-auto mb-4 text-muted">
                <a th:href="@{/logout}" class="btn btn-outline-danger px-4 rounded-pill">
                    <i class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión
                </a>
            </div>

        </div>
    </div>

</section>

</body>
</html>
