<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title>Panel de PAP/PATI</title>
</head>
<body>

<section layout:fragment="content">

    <div class="card overflow-hidden shadow-sm">
        <div class="row g-0">
            <div class="col-md-4 d-flex align-items-center justify-content-center bg-light p-5">
                <h2 class="text-primary fw-bold text-center">Panel de Control</h2>
            </div>

            <div class="col-md-8">

                <a th:href="@{/pap_pati/asignaciones}" class="text-decoration-none text-dark">
                    <div class="p-4 border-bottom option-row">
                        <h5 class="text-primary fw-bold">Ver peticiones de asistencia pendientes</h5>
                        <p class="mb-0 text-muted">Consulta las peticiones de asistencia pendientes de resolución</p>
                    </div>
                </a>

                <a th:href="@{/requestAssist/list}" class="text-decoration-none text-dark">
                    <div class="p-4 option-row">
                        <h5 class="text-primary fw-bold">Ver Peticiones de Match</h5>
                        <p class="mb-0 text-muted">Revisa y gestiona las solicitudes de asistencia pendientes de ser asignadas</p>
                    </div>
                </a>

            </div>
        </div>
    </div>

</section>

</body>
</html>
