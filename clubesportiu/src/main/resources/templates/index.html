<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}"> <!-- Usa el layout base[cite: 1] -->
<head>
    <title>Home</title>
</head>
<body>

<section layout:fragment="content"> <!-- Se inserta en el "content" del base[cite: 1] -->

    <div class="card shadow-sm border-0">
        <div class="row g-0">
            <!-- Columna Izquierda (Como en image_b921b7.png) -->
            <div class="col-md-4 d-flex align-items-center justify-content-center bg-light border-end p-5">
                <h2 class="text-primary fw-bold text-center">How would you like to proceed?</h2>
            </div>

            <!-- Columna Derecha (Opciones) -->
            <div class="col-md-8">

                <!-- Opción 1: Login -->
                <a th:href="@{/login}" class="text-decoration-none text-dark">
                    <div class="p-4 border-bottom option-row">
                        <h5 class="text-primary fw-bold">Log In</h5>
                        <p class="mb-0 text-muted">Access your existing account.</p>
                    </div>
                </a>

                <!-- Opción 2: OVIUser -->
                <a th:href="@{/registrar/ovi}" class="text-decoration-none text-dark">
                    <div class="p-4 border-bottom option-row">
                        <h5 class="text-primary fw-bold">Sign Up as OVIUser</h5>
                        <p class="mb-0 text-muted">For personal use and individual management.</p>
                    </div>
                </a>

                <!-- Opción 3: pap pati -->
                <a th:href="@{/registrar/pap}" class="text-decoration-none text-dark">
                    <div class="p-4 option-row">
                        <h5 class="text-primary fw-bold">Sign Up as pap pati</h5>
                        <p class="mb-0 text-muted">Specialized access for partners and providers.</p>
                    </div>
                </a>

            </div>
        </div>
    </div>
</section>

</body>
