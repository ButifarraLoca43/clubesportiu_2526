<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<div class="d-flex justify-content-end w-100" th:fragment="logininfo" style="margin: 10px;">

    <div class="d-flex align-items-center shadow-sm p-2 bg-light rounded-pill border">

        <div th:if="${session.user == null}" class="px-2">
            <span class="text-muted small me-2">¿Ya tienes cuenta?</span>
            <a th:href="@{/login}" class="btn btn-primary btn-sm rounded-pill px-3">
                <i class="bi bi-person-fill"></i> Entrar
            </a>
        </div>

        <div th:unless="${session.user == null}" class="d-flex align-items-center px-2">
            <div class="bg-success text-white rounded-circle d-flex justify-content-center align-items-center me-2"
                 style="width: 30px; height: 30px;">
                <i class="bi bi-person-check"></i>
            </div>

            <span class="me-3">
                <small class="text-muted d-block" style="font-size: 0.7rem; line-height: 1;">Conectado como</small>
                <strong th:text="${session.user.userName}">Usuario</strong>
            </span>

            <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm rounded-pill border-0">
                <i class="bi bi-box-arrow-right"></i> Salir
            </a>
        </div>

    </div>
</div>
</body>
</html>
