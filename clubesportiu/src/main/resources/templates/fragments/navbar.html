<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg bg-light mb-4" data-bs-theme="light">
    <div class="container-fluid">

        <a th:if="${session.user == null}"
           class="navbar-brand d-flex align-items-center" th:href="@{/} " aria-label="OVI Portal - Ir a inicio">
            <img th:src="@{/imagenes/logo_ovi.png}" alt="Logo OVI" style="height: 50px;" class="me-2">
            <span class="fw-bold text-primary">OVI Portal</span>
        </a>

        <a th:unless="${session.user == null}"
           class="navbar-brand d-flex align-items-center"
           th:href="@{/{rol}/panel(rol=${#strings.toLowerCase(session.user.tipoUsuario)})}" aria-label="OVI Portal - Ir a mi panel">
            <img th:src="@{/imagenes/logo_ovi.png}" alt="Logo OVI" style="height: 50px;" class="me-2">
            <span class="fw-bold text-primary">OVI Portal</span>
        </a>


        <div class="collapse navbar-collapse" id="navbarColor03">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/informacion}">Información</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/activity/listPublicas}">Actividades</a>
                </li>
            </ul>

            <div class="d-flex align-items-center">

                <ul th:if="${session.user == null}" class="navbar-nav">
                    <li class="nav-item">
                        <a class="btn btn-primary btn-sm rounded-pill px-4" th:href="@{/login}">
                            <i class="bi bi-person-fill"></i> Entrar
                        </a>
                    </li>
                </ul>

                <div th:unless="${session.user == null}" class="d-flex align-items-center bg-white border rounded-pill p-1 shadow-sm">
                    <div class="bg-success text-white rounded-circle d-flex justify-content-center align-items-center me-2"
                         style="width: 32px; height: 32px;">
                        <span th:text="${#strings.substring(session.user.userName,0,1).toUpperCase()}">U</span>
                    </div>

                    <div class="me-3 lh-1">
                        <div class="fw-bold small" th:text="${session.user.userName}">Nombre Usuario</div>
                        <div class="text-secondary" style="font-size: 0.75rem;"
                             th:text="${session.user.tipoUsuario.name() == 'OVIUser' ? 'usuario de la OVI' : session.user.tipoUsuario.name() == 'PAP_PATI' ? 'asistente personal' : session.user.tipoUsuario}">
                            Tipo</div>
                    </div>

                    <a th:href="@{/logout}" class="btn btn-danger btn-sm rounded-pill me-1" aria-label="Cerrar sesión">
                        <i class="bi bi-box-arrow-right"></i> Salir
                    </a>
                </div>

            </div>
        </div>
    </div>
</nav>

</body>
</html>
