<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Panel técnico</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" />
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="text-center mb-4">
        <h1 class="fw-bold">Gestión de la aplicación SgOVI</h1>
        <p class="text-muted">Panel principal de administración</p>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h4 class="card-title mb-3">PAP / PATI</h4>
                    <div class="list-group">

                        <a href="/pap_pati/list"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Listar PAP/PATIs
                            <span class="badge bg-success rounded-pill"></span>
                        </a>
                        <a href="/tecnico/papmanagement"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Gestionar registros PAP/PATIs
                            <span class="badge bg-success rounded-pill">+</span>
                        </a>


                        <a href="/oviuser/list"
                           class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            Listar OVI Users
                            <span class="badge bg-primary rounded-pill"></span>
                        </a>


                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
