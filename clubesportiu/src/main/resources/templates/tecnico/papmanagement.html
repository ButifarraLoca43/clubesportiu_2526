<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <title>Solicitudes registro PAP/PATI</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"/>

</head>
<body>
<main class="container mt-4">

    <h1>Solicitudes registro PAP/PATI</h1>

    <table class="table table-striped">
        <thead>
        <tr>
            <th>DNI</th>
            <th>Nombre</th>
            <th>Apellidos</th>
            <th>Teléfono</th>
            <th>Email</th>
            <th>Fecha de Nacimiento</th>
            <th>Dirección</th>
            <th>Experiencia</th>
            <th>Experiencia</th>
            <th>Acciones</th>

        </tr>
        </thead>

        <tbody>
        <tr th:each="i : ${pap_patis}">
            <td th:text="${i.idNumber}"></td>
            <td th:text="${i.name}"></td>
            <td th:text="${i.surname}"></td>
            <td th:text="${i.phoneNumber}"></td>
            <td th:text="${i.email}"></td>
            <td th:text="${i.dateBirth}"></td>
            <td th:text="${i.address}"></td>
            <td th:text="${i.experience}"></td>
            <td th:text="${i.experience}"></td>

            <td>
                <a th:href="@{/tecnico/aceptar/{idNumber}(idNumber=${i.idNumber})}"
                   class="btn btn-warning btn-sm">Aceptar</a>

                <a th:href="@{/tecnico/rechazar/{idNumber}(idNumber=${i.idNumber})}"
                   class="btn btn-danger btn-sm">Rechazar</a>
            </td>
        </tr>
        </tbody>
    </table>

</main>
</body>
</html>
