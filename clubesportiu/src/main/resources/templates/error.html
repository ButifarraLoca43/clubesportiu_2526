<!DOCTYPE html>
<html lang="ca" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/base}">
<head>
    <meta charset="UTF-8">
    <title th:text="${errorName}">Error a la aplicación</title>
</head>
<body>

<section layout:fragment="content">

    <div class="card overflow-hidden shadow-sm border-warning"
         th:classappend="${#strings.equals(errorName, 'Error inesperat')} ? 'border-danger' : 'border-warning'">
        <div class="row g-0">

            <div class="col-md-4 d-flex flex-column align-items-center justify-content-center bg-light p-5 border-end text-center">
                <span class="display-3 mb-2"
                      th:text="${#strings.equals(errorName, 'Error inesperado')} ? '❌' : '⚠️'">⚠️</span>
                <h1 class="text-dark fw-bold mt-2 h4" th:text="${errorName}">Tipo de error</h1>
                <p class="text-muted small px-3">Gestión global de excepciones</p>
            </div>

            <div class="col-md-8">

                <div class="p-4 border-bottom bg-white">
                    <h2 class="fw-bold h5 text-dark mb-3">¿Qué ha pasado?</h2>
                    <div class="alert alert-secondary border-0 bg-light p-3 rounded">
                        <p class="mb-0 text-dark font-monospace small" th:text="${message}">
                            Mensaje de la excepción de la base de datos.
                        </p>
                    </div>
                </div>

                <a th:href="@{/}" class="text-decoration-none text-dark">
                    <div class="p-4 option-row bg-light bg-opacity-50 transition-all">
                        <h3 class="text-primary fw-bold h5 mb-1">Volver a la página principal</h3>
                        <p class="mb-0 text-muted small">Regresa al menú de inicio de forma completamente segura.</p>
                    </div>
                </a>

            </div>
        </div>
    </div>

</section>

</body>
</html>
